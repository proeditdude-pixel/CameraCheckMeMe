<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CameraCheckMeMe — Fun with Poses</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff4d4d;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0a;
            color: #efefef;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/feComposite operator='in' in2='SourceGraphic'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-blend-mode: overlay;
        }

        .soft-panel {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }

        .mirror { transform: scaleX(-1); }

        .reaction-viewport img {
            display: none;
            max-height: 65vh;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease-out;
        }

        .reaction-viewport img.active {
            display: block;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-light {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #333;
            transition: all 0.3s;
        }

        .status-on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- Simple Intro Screen -->
    <div id="setup-screen" class="fixed inset-0 z-[100] bg-[#0a0a0a] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-extrabold tracking-tight mb-4">CameraCheck<span class="text-[#ff4d4d]">MeMe</span></h1>
        <p id="status-text" class="text-zinc-400 text-lg mb-8 max-w-xs">A fun way to trigger memes with your face and hands.</p>
        <button id="start-btn" class="hidden px-12 py-4 bg-white text-black font-bold rounded-2xl hover:bg-zinc-200 transition-all active:scale-95">
            Let's Go
        </button>
    </div>

    <!-- Clean Header -->
    <nav class="flex justify-between items-center px-10 py-8 z-10">
        <div class="flex items-center gap-6">
            <div class="soft-panel px-4 py-2 flex items-center gap-3">
                <div class="flex gap-1.5">
                    <div id="face-dot" class="status-light"></div>
                    <div id="hand-dot" class="status-light"></div>
                </div>
                <span id="loading-status" class="text-[11px] font-medium uppercase tracking-widest text-zinc-500">Checking...</span>
            </div>
        </div>
        <div class="text-2xl font-extrabold tracking-tighter">CameraCheckMeMe</div>
        <div class="w-10 h-10"></div>
    </nav>

    <main class="flex-1 relative flex items-center justify-center px-6">
        
        <!-- Camera Bubble -->
        <div class="absolute bottom-10 left-10 w-48 h-48 soft-panel overflow-hidden z-20 shadow-xl group">
            <video id="input_video" class="hidden"></video>
            <!-- Removed grayscale filter for natural color -->
            <canvas id="output_canvas" class="w-full h-full object-cover mirror transition-all duration-500"></canvas>
            <div class="absolute inset-0 border-2 border-white/5 rounded-[24px] pointer-events-none"></div>
        </div>

        <!-- The Stage -->
        <div id="reaction-container" class="reaction-viewport w-full max-w-4xl flex items-center justify-center">
            <div id="idle-msg" class="text-center transition-all duration-700">
                <div class="text-6xl mb-6 opacity-20">👋</div>
                <p class="text-zinc-600 font-medium tracking-wide">Show me a pose to start</p>
            </div>

            <!-- Memes -->
            <img id="res-speed" src="https://media1.tenor.com/m/g0TdYZ1BMpgAAAAd/ishowspeed-meme.gif">
            <img id="res-shush" src="https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUya2RhcHJ2cmo0amhnZ2N6bDNmcW9ubXhyZDFnaDY4bHZ6OHl3aHJ2aCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/4AwFO4f2VLo2fIFFA2/200w.gif">
            <img id="res-point" src="https://media.tenor.com/FWro5uCxvAUAAAAe/idea-monkey-tiktok-monkey.png">
            <img id="res-low" src="https://media.tenor.com/B-uBLzMr9BwAAAAe/low-cortisol.png">
            <img id="res-high" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTrdP6ubQQy2VC_DCRlys32ieP_Age6WcauUsblmqZscg&s=10">
        </div>

        <!-- Simple Menu -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 soft-panel p-2 flex gap-1 z-30 shadow-2xl">
            <div class="px-5 py-3 rounded-xl text-[11px] font-bold text-zinc-400">👄 LIP PUCKER</div>
            <div class="px-5 py-3 rounded-xl text-[11px] font-bold text-zinc-400">🤫 SHUSH</div>
            <div class="px-5 py-3 rounded-xl text-[11px] font-bold text-zinc-400">☝️ ONE FINGER</div>
            <div class="px-5 py-3 rounded-xl text-[11px] font-bold text-zinc-400">😌 CHILL</div>
            <div class="px-5 py-3 rounded-xl text-[11px] font-bold text-zinc-400">😱 STRESS</div>
        </div>
    </main>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const setupScreen = document.getElementById('setup-screen');
        const statusText = document.getElementById('status-text');
        const statusPill = document.getElementById('loading-status');

        const indicators = { 
            face: document.getElementById('face-dot'), 
            hand: document.getElementById('hand-dot') 
        };
        
        const results = {
            speed: document.getElementById('res-speed'),
            shush: document.getElementById('res-shush'),
            point: document.getElementById('res-point'),
            low: document.getElementById('res-low'),
            high: document.getElementById('res-high'),
            idle: document.getElementById('idle-msg')
        };

        function setReaction(key) {
            Object.keys(results).forEach(k => {
                if(k === 'idle') {
                    results[k].style.display = (key === 'idle' ? 'block' : 'none');
                } else {
                    results[k].classList.toggle('active', k === key);
                }
            });
        }

        async function initApp() {
            try {
                if (typeof window.FaceMesh === 'undefined' || typeof window.Hands === 'undefined') {
                    setTimeout(initApp, 500);
                    return;
                }

                const faceMesh = new window.FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
                faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });

                const hands = new window.Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
                hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });

                let faceData = null;
                faceMesh.onResults(res => { faceData = res; });

                hands.onResults(handRes => {
                    if (!faceData || !faceData.image) return;
                    
                    if (canvasElement.width !== videoElement.videoWidth) {
                        canvasElement.width = videoElement.videoWidth || 640;
                        canvasElement.height = videoElement.videoHeight || 480;
                    }
                    
                    canvasCtx.save();
                    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                    canvasCtx.drawImage(faceData.image, 0, 0, canvasElement.width, canvasElement.height);

                    let mood = 'idle';
                    let faceCenter = {x: 0, y: 0};

                    if (faceData.multiFaceLandmarks?.length > 0) {
                        indicators.face.classList.add('status-on');
                        const f = faceData.multiFaceLandmarks[0];
                        const topL = f[13], botL = f[14], leftM = f[61], rightM = f[291];
                        const lBrow = f[52], lEye = f[159];

                        faceCenter = { x: (leftM.x + rightM.x)/2, y: (topL.y + botL.y)/2 };
                        const mouthOpen = Math.abs(topL.y - botL.y);
                        const mouthWidth = Math.abs(leftM.x - rightM.x);
                        const browDist = Math.abs(lBrow.y - lEye.y);

                        if (mouthWidth < 0.045) {
                            mood = 'speed';
                        } else if (browDist < 0.025 && mouthOpen < 0.01) {
                            mood = 'low';
                        }
                    } else { 
                        indicators.face.classList.remove('status-on');
                    }

                    if (handRes.multiHandLandmarks?.length > 0) {
                        indicators.hand.classList.add('status-on');
                        
                        const hCount = handRes.multiHandLandmarks.length;
                        const h1 = handRes.multiHandLandmarks[0];
                        const h1Tip = h1[8], h1Base = h1[5], h1Middle = h1[12];
                        const distToFace1 = Math.hypot(h1Tip.x - faceCenter.x, h1Tip.y - faceCenter.y);
                        
                        if (hCount >= 2) {
                            const h2 = handRes.multiHandLandmarks[1];
                            const h2Tip = h2[8];
                            const distToFace2 = Math.hypot(h2Tip.x - faceCenter.x, h2Tip.y - faceCenter.y);
                            
                            // More relaxed "hands near head" detection
                            if (distToFace1 < 0.25 && distToFace2 < 0.25) {
                                mood = 'high';
                            }
                        }

                        if (mood === 'idle') {
                            if (distToFace1 < 0.08) mood = 'shush';
                            else if (h1Tip.y < h1Base.y - 0.1 && h1Middle.y > h1Base.y) mood = 'point';
                        }
                    } else { 
                        indicators.hand.classList.remove('status-on');
                    }

                    setReaction(mood);
                    canvasCtx.restore();
                });

                statusText.textContent = "Everything is ready for you.";
                startBtn.classList.remove('hidden');
                
                startBtn.onclick = async () => {
                    startBtn.textContent = "Almost there...";
                    try {
                        const camera = new window.Camera(videoElement, {
                            onFrame: async () => {
                                await faceMesh.send({image: videoElement});
                                await hands.send({image: videoElement});
                            },
                            width: 640, height: 480
                        });
                        await camera.start();
                        setupScreen.classList.add('opacity-0', 'pointer-events-none');
                        setTimeout(() => setupScreen.style.display = 'none', 500);
                        statusPill.textContent = 'Camera On';
                    } catch (err) {
                        alert("I need your camera to see the memes!");
                    }
                };
            } catch (e) {
                statusText.textContent = "Something went wrong on our end.";
            }
        }
        initApp();
    </script>
</body>
</html>
