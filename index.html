<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pose Reaction Pro</title>
    <!-- Mediapipe CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .mirror { transform: scaleX(-1); }
        .reaction-container img {
            display: none;
            max-height: 75vh;
            width: auto;
            border-radius: 2rem;
            object-fit: contain;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .reaction-container img.active { display: block; }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .status-dot { transition: background-color 0.3s ease; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-sans overflow-hidden">

    <!-- Startup Overlay -->
    <div id="overlay" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center p-8 text-center">
        <div class="mb-8 relative">
            <div class="w-20 h-20 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center font-bold text-blue-500">AI</div>
        </div>
        <h1 class="text-4xl font-black mb-4 tracking-tighter uppercase italic">Pose Reaction <span class="text-blue-500">2.0</span></h1>
        <p id="loading-msg" class="text-zinc-500 mb-8 font-mono">Initializing Neural Engines...</p>
        <button id="ready-btn" class="hidden bg-white text-black font-black py-4 px-12 rounded-full hover:bg-blue-500 hover:text-white transition-all transform hover:scale-110 active:scale-95 shadow-2xl">
            ACCESS CAMERA
        </button>
    </div>

    <div class="h-screen flex flex-col">
        <!-- Header -->
        <header class="p-4 border-b border-zinc-900 bg-black/40 backdrop-blur-xl flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-1.5 rounded-lg shadow-lg shadow-blue-900/20">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 10l-4 4l6 6l4-16l-18 7l4 2l2 6l3-4"/></svg>
                </div>
                <span class="font-black text-xl tracking-tighter uppercase">Poze<span class="text-blue-500">AI</span></span>
            </div>
            <div class="flex gap-4">
                <div class="flex items-center gap-2 bg-zinc-900 px-3 py-1.5 rounded-full border border-zinc-800">
                    <div id="face-dot" class="status-dot w-2 h-2 rounded-full bg-red-600"></div>
                    <span class="text-[10px] font-bold uppercase opacity-60">Face Sensor</span>
                </div>
                <div class="flex items-center gap-2 bg-zinc-900 px-3 py-1.5 rounded-full border border-zinc-800">
                    <div id="hand-dot" class="status-dot w-2 h-2 rounded-full bg-red-600"></div>
                    <span class="text-[10px] font-bold uppercase opacity-60">Hand Sensor</span>
                </div>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="flex-1 flex flex-col md:flex-row p-4 gap-4 overflow-hidden">
            <!-- Camera Feed -->
            <div class="md:w-1/3 relative bg-zinc-900 rounded-[2rem] overflow-hidden border border-zinc-800 shadow-2xl">
                <video id="webcam" class="hidden" playsinline></video>
                <canvas id="output_canvas" class="w-full h-full object-cover mirror"></canvas>
                
                <div class="absolute bottom-4 left-4 right-4 grid grid-cols-2 gap-2">
                    <div class="bg-black/60 backdrop-blur p-2 rounded-xl border border-white/5 text-[10px] font-bold text-center">🤫 SHUSH (FINGER TO MOUTH)</div>
                    <div class="bg-black/60 backdrop-blur p-2 rounded-xl border border-white/5 text-[10px] font-bold text-center">☝️ HEY (POINT TO SKY)</div>
                    <div class="bg-black/60 backdrop-blur p-2 rounded-xl border border-white/5 text-[10px] font-bold text-center">😂 LAUGH (BIG SMILE)</div>
                    <div class="bg-black/60 backdrop-blur p-2 rounded-xl border border-white/5 text-[10px] font-bold text-center">👐 STRESS (2 HANDS UP)</div>
                </div>
            </div>

            <!-- Reaction Output -->
            <div class="flex-1 bg-black rounded-[2rem] border border-zinc-900 flex items-center justify-center relative overflow-hidden group">
                <div id="idle-prompt" class="text-center group-hover:scale-105 transition-transform duration-700">
                    <div class="text-6xl mb-4 opacity-20">🎭</div>
                    <p class="text-zinc-700 font-black uppercase tracking-[0.3em]">Awaiting Pose</p>
                </div>
                
                <div class="reaction-container flex items-center justify-center w-full h-full p-8">
                    <img id="img-low" src="https://i.redd.it/ojhiwslg1yrf1.jpeg" alt="Low Cortisol">
                    <img id="img-speed" src="https://media.tenor.com/5qbofo9sJsgAAAAe/my-mom-is-kinda-homeless-ishowspeed.png" alt="Speed">
                    <img id="img-shush" src="https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUya2RhcHJ2cmo0amhnZ2N6bDNmcW9ubXhyZDFnaDY4bHZ6OHl3aHJ2aCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/4AwFO4f2VLo2fIFFA2/200w.gif" alt="Shush">
                    <img id="img-sky" src="https://media.tenor.com/T_G76eQ2_88AAAAM/pointing-up-i-have-a-question.gif" alt="Hey">
                    <img id="img-laugh" src="https://media1.tenor.com/m/bVv7G3zfJHEAAAAd/heheheha-laugh.gif" alt="Laugh">
                    <img id="img-high" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTrdP6ubQQy2VC_DCRlys32ieP_Age6WcauUsblmqZscg&s=10" alt="High Stress">
                    <img id="img-shock" src="https://media1.tenor.com/m/WfqkollmqXYAAAAd/danganronpa-kyoko-kirigiri.gif" alt="Shock">
                </div>
            </div>
        </main>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const readyBtn = document.getElementById('ready-btn');
        const loadingMsg = document.getElementById('loading-msg');
        
        const faceDot = document.getElementById('face-dot');
        const handDot = document.getElementById('hand-dot');
        const idlePrompt = document.getElementById('idle-prompt');
        
        const images = {
            low: document.getElementById('img-low'),
            speed: document.getElementById('img-speed'),
            shush: document.getElementById('img-shush'),
            sky: document.getElementById('img-sky'),
            laugh: document.getElementById('img-laugh'),
            high: document.getElementById('img-high'),
            shock: document.getElementById('img-shock')
        };

        let currentMood = 'idle';
        let faceResults = null;
        let handResults = null;

        function updateUI(mood) {
            if (mood === currentMood) return;
            currentMood = mood;
            
            idlePrompt.style.display = (mood === 'idle') ? 'block' : 'none';
            Object.keys(images).forEach(key => {
                images[key].classList.toggle('active', key === mood);
            });
        }

        async function setupAI() {
            // Load Face Mesh
            const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            faceMesh.onResults(res => { faceResults = res.multiFaceLandmarks; });

            // Load Hands
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            hands.onResults(res => { handResults = res.multiHandLandmarks; });

            loadingMsg.textContent = "Hardware Acceleration Active. System Ready.";
            readyBtn.classList.remove('hidden');

            readyBtn.onclick = async () => {
                readyBtn.textContent = "STARTING...";
                const camera = new Camera(video, {
                    onFrame: async () => {
                        await faceMesh.send({image: video});
                        await hands.send({image: video});
                        detectPose();
                    },
                    width: 640,
                    height: 480
                });
                await camera.start();
                overlay.style.display = 'none';
            };
        }

        function detectPose() {
            // Setup Canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            let mood = 'idle';
            let mouthY = 0.5;
            let mouthX = 0.5;
            let noseY = 0.5;
            let eyeScale = 0.1;

            // 1. Process Face
            if (faceResults && faceResults.length > 0) {
                faceDot.style.backgroundColor = '#16a34a'; // Green
                const f = faceResults[0];
                
                const topLip = f[13], botLip = f[14], leftM = f[61], rightM = f[291];
                const leftE = f[159], rightE = f[386];
                
                mouthY = (topLip.y + botLip.y) / 2;
                mouthX = (leftM.x + rightM.x) / 2;
                noseY = f[1].y;
                eyeScale = Math.abs(leftE.x - rightE.x);

                const vOpen = Math.abs(topLip.y - botLip.y);
                const hWidth = Math.abs(leftM.x - rightM.x);

                // Detection Logic
                if (hWidth > eyeScale * 0.95 && vOpen > 0.03) mood = 'laugh';
                else if (vOpen > 0.12) mood = 'shock';
                else if (hWidth < eyeScale * 0.45 && vOpen > 0.01) mood = 'speed';
                else if (vOpen < 0.012) mood = 'low';
            } else {
                faceDot.style.backgroundColor = '#dc2626'; // Red
            }

            // 2. Process Hands (Overrides Face)
            if (handResults && handResults.length > 0) {
                handDot.style.backgroundColor = '#16a34a';
                const h1 = handResults[0];
                const indexTip = h1[8], indexBase = h1[5], midTip = h1[12], wrist = h1[0];
                
                const distToMouth = Math.hypot(indexTip.x - mouthX, indexTip.y - mouthY);

                // SKY POSE: Index finger is pointing straight up and is significantly above the nose
                if (indexTip.y < noseY - 0.08 && indexTip.y < indexBase.y - 0.04) {
                    mood = 'sky';
                }
                // SHUSH POSE: Index finger near mouth
                else if (distToMouth < 0.15 && indexTip.y < midTip.y) {
                    mood = 'shush';
                }
                // STRESS POSE: Both hands high up
                else if (handResults.length >= 2) {
                    const h2 = handResults[1];
                    if (wrist.y < mouthY && h2[0].y < mouthY) {
                        mood = 'high';
                    }
                }
            } else {
                handDot.style.backgroundColor = '#dc2626';
            }

            updateUI(mood);
        }

        setupAI();
    </script>
</body>
</html>
