<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pose Reaction</title>
    <!-- Direct CDN Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .mirror { transform: scaleX(-1); }
        .reaction-img {
            display: none;
            max-height: 80vh;
            max-width: 90%;
            border-radius: 2rem;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .reaction-img.active { display: block; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .trigger-hint {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col font-sans overflow-hidden">

    <!-- Loading Screen -->
    <div id="setup-screen" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center p-6 text-center">
        <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h1 class="text-3xl font-black mb-2 tracking-tighter uppercase">Initializing Engine</h1>
        <p id="status-text" class="text-zinc-500 max-w-xs">Connecting to MediaPipe AI Vision...</p>
        <button id="start-btn" class="hidden mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-12 rounded-2xl transition-all scale-110 shadow-[0_0_30px_rgba(37,99,235,0.4)]">
            START CAMERA
        </button>
    </div>

    <!-- Header -->
    <header class="p-4 border-b border-zinc-900 flex justify-between items-center bg-zinc-950/50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white">P</div>
            <h1 class="text-xl font-black tracking-tighter uppercase">Poze<span class="text-blue-500">AI</span></h1>
        </div>
        <div id="loading-status" class="px-4 py-1.5 rounded-full bg-zinc-900 text-zinc-500 text-[10px] font-bold uppercase tracking-widest border border-zinc-800">
            System Standby
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row p-4 gap-4 overflow-hidden">
        <!-- LEFT SIDE: Camera View -->
        <div class="flex-1 relative bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 shadow-2xl flex items-center justify-center">
            <video id="input_video" class="hidden" playsinline></video>
            <canvas id="output_canvas" class="w-full h-full object-cover mirror absolute inset-0"></canvas>
            
            <div class="absolute top-6 left-6 flex gap-3 z-10">
                <div class="bg-black/60 backdrop-blur-md px-4 py-2 rounded-xl border border-white/5 flex items-center gap-2">
                    <div id="face-dot" class="w-2 h-2 rounded-full bg-red-500 transition-colors duration-300"></div>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Face</span>
                </div>
                <div class="bg-black/60 backdrop-blur-md px-4 py-2 rounded-xl border border-white/5 flex items-center gap-2">
                    <div id="hand-dot" class="w-2 h-2 rounded-full bg-red-500 transition-colors duration-300"></div>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Hand</span>
                </div>
            </div>

            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2 w-max max-w-[90%] overflow-x-auto px-4 pb-2 z-10 no-scrollbar">
                <div class="trigger-hint px-3 py-2 rounded-xl text-[10px] font-bold">😂 BIG SMILE = LAUGH</div>
                <div class="trigger-hint px-3 py-2 rounded-xl text-[10px] font-bold">👐 2 HANDS HEAD = STRESS</div>
                <div class="trigger-hint px-3 py-2 rounded-xl text-[10px] font-bold">👉 POINT CHEST = ME?</div>
                <div class="trigger-hint px-3 py-2 rounded-xl text-[10px] font-bold">🤫 FINGER MOUTH = SHUSH</div>
            </div>
        </div>

        <!-- RIGHT SIDE: Content View -->
        <div class="flex-1 flex flex-col items-center justify-center bg-zinc-950 rounded-[2.5rem] border border-zinc-900 shadow-inner p-4 relative">
            <div id="reaction-container" class="relative w-full h-full flex items-center justify-center">
                <div id="idle-msg" class="text-zinc-800 text-center flex flex-col items-center gap-4">
                    <div class="text-8xl opacity-20">📡</div>
                    <h2 class="uppercase tracking-[0.2em] font-black text-2xl opacity-30">Awaiting Signal</h2>
                </div>
                <img id="res-speed" class="reaction-img" src="https://media1.tenor.com/m/g0TdYZ1BMpgAAAAd/ishowspeed-meme.gif">
                <img id="res-shush" class="reaction-img" src="https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUya2RhcHJ2cmo0amhnZ2N6bDNmcW9ubXhyZDFnaDY4bHZ6OHl3aHJ2aCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/4AwFO4f2VLo2fIFFA2/200w.gif">
                <img id="res-point" class="reaction-img" src="https://media.tenor.com/4nPuIuwLs8AAAAAM/who-me.gif">
                <img id="res-low" class="reaction-img" src="https://media.tenor.com/B-uBLzMr9BwAAAAe/low-cortisol.png">
                <img id="res-high" class="reaction-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTrdP6ubQQy2VC_DCRlys32ieP_Age6WcauUsblmqZscg&s=10">
                <img id="res-shock" class="reaction-img" src="https://media1.tenor.com/m/WfqkollmqXYAAAAd/danganronpa-kyoko-kirigiri.gif">
                <img id="res-laugh" class="reaction-img" src="https://media1.tenor.com/m/bVv7G3zfJHEAAAAd/heheheha-laugh.gif">
            </div>
        </div>
    </main>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const setupScreen = document.getElementById('setup-screen');
        const statusText = document.getElementById('status-text');
        const statusPill = document.getElementById('loading-status');

        const indicators = { face: document.getElementById('face-dot'), hand: document.getElementById('hand-dot') };
        const results = {
            speed: document.getElementById('res-speed'),
            shush: document.getElementById('res-shush'),
            point: document.getElementById('res-point'),
            low: document.getElementById('res-low'),
            high: document.getElementById('res-high'),
            shock: document.getElementById('res-shock'),
            laugh: document.getElementById('res-laugh'),
            idle: document.getElementById('idle-msg')
        };

        let lastMood = 'idle';

        function setReaction(key) {
            if (key === lastMood) return;
            lastMood = key;
            Object.keys(results).forEach(k => {
                if(k === 'idle') results[k].style.display = (key === 'idle' ? 'flex' : 'none');
                else results[k].classList.toggle('active', k === key);
            });
        }

        async function initApp() {
            try {
                const faceMesh = new window.FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
                faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });

                const hands = new window.Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
                hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6 });

                let faceData = null;
                faceMesh.onResults(res => { faceData = res; });

                hands.onResults(handRes => {
                    if (!faceData || !faceData.image) return;
                    
                    canvasElement.width = videoElement.videoWidth || 640;
                    canvasElement.height = videoElement.videoHeight || 480;
                    
                    canvasCtx.save();
                    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                    canvasCtx.drawImage(faceData.image, 0, 0, canvasElement.width, canvasElement.height);

                    let mood = 'idle';
                    let mouthPos = {x: 0.5, y: 0.5};
                    let faceBottomY = 1.0;
                    let faceCenterX = 0.5;
                    let eyeDist = 0.1;

                    // 1. Process Face Landmark Metrics
                    if (faceData.multiFaceLandmarks?.length > 0) {
                        indicators.face.classList.replace('bg-red-500', 'bg-green-500');
                        const f = faceData.multiFaceLandmarks[0];
                        
                        const upperLip = f[13], lowerLip = f[14], leftMouth = f[61], rightMouth = f[291];
                        const leftEye = f[159], rightEye = f[386];

                        mouthPos = { x: (leftMouth.x + rightMouth.x)/2, y: (upperLip.y + lowerLip.y)/2 };
                        faceBottomY = f[152].y;
                        faceCenterX = (leftMouth.x + rightMouth.x)/2;
                        eyeDist = Math.abs(leftEye.x - rightEye.x);

                        const vOpen = Math.abs(upperLip.y - lowerLip.y);
                        const hWidth = Math.abs(leftMouth.x - rightMouth.x);

                        // Strict Mood Conditions
                        if (hWidth > eyeDist * 1.1 && vOpen > 0.04) {
                            mood = 'laugh';
                        } else if (vOpen > 0.12) {
                            mood = 'shock';
                        } else if (hWidth < eyeDist * 0.4 && vOpen > 0.01) {
                            mood = 'speed';
                        } else if (vOpen < 0.01 && hWidth > eyeDist * 0.5 && hWidth < eyeDist * 0.9) {
                            mood = 'low';
                        }
                    } else { 
                        indicators.face.classList.replace('bg-green-500', 'bg-red-500'); 
                    }

                    // 2. Hand Overrides (High Priority)
                    if (handRes.multiHandLandmarks?.length > 0) {
                        indicators.hand.classList.replace('bg-red-500', 'bg-green-500');
                        
                        const hList = handRes.multiHandLandmarks;
                        const h1 = hList[0];
                        const indexTip = h1[8], wrist = h1[0], indexBase = h1[5];

                        const distToMouth = Math.hypot(indexTip.x - mouthPos.x, indexTip.y - mouthPos.y);

                        // SHUSH (Very close to mouth) - Highest Priority Hand
                        if (distToMouth < 0.09) {
                            mood = 'shush';
                        } 
                        // STRESS (2 hands high)
                        else if (hList.length >= 2) {
                            const h2 = hList[1];
                            if (wrist.y < mouthPos.y && h2[0].y < mouthPos.y) {
                                mood = 'high';
                            }
                        }
                        // POINT CHEST (Hand below face, finger pointing up)
                        else if (wrist.y > faceBottomY && indexTip.y < indexBase.y - 0.05) {
                             if (Math.abs(indexTip.x - faceCenterX) < 0.2) {
                                mood = 'point';
                             }
                        }
                    } else { 
                        indicators.hand.classList.replace('bg-green-500', 'bg-red-500'); 
                    }

                    setReaction(mood);
                    canvasCtx.restore();
                });

                statusText.textContent = "AI Vision Loaded.";
                startBtn.classList.remove('hidden');
                
                startBtn.onclick = async () => {
                    startBtn.textContent = "ACTIVATING CAMERA...";
                    const camera = new window.Camera(videoElement, {
                        onFrame: async () => {
                            await faceMesh.send({image: videoElement});
                            await hands.send({image: videoElement});
                        },
                        width: 640, height: 480
                    });
                    await camera.start();
                    setupScreen.style.display = 'none';
                    statusPill.textContent = 'LIVE';
                    statusPill.classList.replace('text-zinc-500', 'text-green-500');
                };
            } catch (e) {
                statusText.textContent = "Error: " + e.message;
            }
        }
        initApp();
    </script>
</body>
</html>
